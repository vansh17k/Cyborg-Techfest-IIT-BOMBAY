<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 50" width="100%" height="100%">
  <defs>
    <!-- Cyan glow for high-tech enhancement -->
    <filter id="logo-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Slanted 'TF' official-style monogram -->
  <g transform="translate(4, 2)">
    <!-- T top bar & main slanted stem and F bottom bar connection -->
    <path d="M 12 8 
             C 12 5.5, 14 4, 18.5 4 
             L 70 4 
             C 71.5 4, 72.5 5, 72 6.5 
             L 69.5 12 
             C 69 13.5, 67.5 14.5, 65.5 14.5 
             L 37.5 14.5 
             L 28.5 35 
             L 48 35 
             C 49.5 35, 50.5 36, 50 37.5 
             L 47.5 43 
             C 47 44.5, 45.5 45.5, 43.5 45.5 
             L 17 45.5 
             C 15.5 45.5, 14.5 44.5, 15 43 
             L 27 14.5 
             L 18.5 14.5 
             C 14.5 14.5, 12 11.5, 12 8 Z" 
          fill="#FFFFFF" />
          
    <!-- F middle horizontal bar -->
    <path d="M 40.5 14.5 
             L 64 14.5 
             C 65.5 14.5, 66.5 15.5, 66 17 
             L 63.5 22.5 
             C 63 24, 61.5 25, 59.5 25 
             L 36 25 
             Z" 
          fill="#FFFFFF" />
          
    <!-- TM Trademark text -->
    <text x="73" y="10" font-family="'Orbitron', 'Inter', 'Space Grotesk', sans-serif" font-size="5" font-weight="900" fill="#FFFFFF" opacity="0.85" letter-spacing="0.05">TM</text>
  </g>
</svg>
